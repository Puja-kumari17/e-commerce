{% extends 'base.html' %}

{% block content %}

<div class="container page-content">

    <h2 class="mb-4">
        Return Request
    </h2>

    {% if success %}
    <div class="alert alert-success">
        Return request submitted.
    </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            name="name"
            class="form-control mb-3"
            placeholder="Name">

        <input
            name="email"
            class="form-control mb-3"
            placeholder="Email">

        <textarea
            name="reason"
            class="form-control mb-3"
            placeholder="Reason"></textarea>

        <input
            name="refund"
            class="form-control mb-3"
            placeholder="Refund Amount">

        <button class="btn btn-danger">
            Submit Request
        </button>

    </form>

</div>

{% endblock %}
